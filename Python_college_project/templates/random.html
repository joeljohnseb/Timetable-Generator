<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Premium Library Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-br from-white via-green-50 to-green-100 min-h-screen p-10"
  >
    <div class="max-w-6xl mx-auto">
      <!-- Header -->
      <div class="flex justify-between items-center mb-12">
        <div>
          <h1
            class="text-4xl font-extrabold bg-gradient-to-l from-green-500 to-green-600 text-transparent bg-clip-text inline-block"
          >
            Library Management System
          </h1>

          <p class="text-gray-500 mt-1 text-sm">
            Minimal & Premium Library System
          </p>
        </div>

        <div
          class="text-lg font-semibold text-green-600 bg-white px-6 py-2 rounded-full shadow-sm border border-green-100"
        >
          📚 <span id="totalBooks">0</span> Books
        </div>
      </div>

      <!-- Add Book Card -->
      <div
        class="bg-white rounded-3xl shadow-xl border border-green-100 p-10 mb-12"
      >
        <h2 class="text-xl font-semibold text-gray-700 mb-8">
          Add / Edit Book
        </h2>

        <div class="grid md:grid-cols-4 gap-6">
          <input
            id="title"
            type="text"
            placeholder="Book Title"
            class="p-4 rounded-2xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-green-400 focus:bg-white outline-none transition-all duration-300"
          />

          <input
            id="author"
            type="text"
            placeholder="Author"
            class="p-4 rounded-2xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-green-400 focus:bg-white outline-none transition-all duration-300"
          />

          <select
            id="status"
            class="p-4 rounded-2xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-green-400 focus:bg-white outline-none transition-all duration-300"
          >
            <option value="Available">Available</option>
            <option value="Issued">Issued</option>
          </select>

          <!-- Premium Button -->
          <button
            id="submitBtn"
            onclick="addOrUpdateBook()"
            class="group relative overflow-hidden bg-white border border-green-500 text-green-600 font-medium rounded-2xl py-4 transition-all duration-300 hover:bg-green-500 hover:text-white hover:shadow-lg hover:scale-[1.02]"
          >
            <span class="relative z-10 tracking-wide"> Add Book </span>

            <span
              class="absolute inset-0 bg-green-500 translate-y-full group-hover:translate-y-0 transition-transform duration-300"
            ></span>
          </button>
        </div>
      </div>

      <!-- Search -->
      <div class="mb-10">
        <input
          type="text"
          id="searchInput"
          onkeyup="searchBooks()"
          placeholder="Search books..."
          class="w-full md:w-1/3 p-4 rounded-2xl bg-white border border-gray-200 focus:ring-2 focus:ring-green-400 outline-none shadow-sm transition"
        />
      </div>

      <!-- Table -->
      <div
        class="bg-white rounded-3xl shadow-xl border border-green-100 overflow-hidden"
      >
        <table class="w-full text-left">
          <thead class="bg-green-50 text-green-700">
            <tr>
              <th class="p-6 font-medium">Title</th>
              <th class="p-6 font-medium">Author</th>
              <th class="p-6 font-medium">Status</th>
              <th class="p-6 text-center font-medium">Actions</th>
            </tr>
          </thead>

          <tbody id="bookList" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
    </div>

    <script>
      let books = JSON.parse(localStorage.getItem("books")) || [];
      let editId = null;

      /* SAVE */
      function saveBooks() {
        localStorage.setItem("books", JSON.stringify(books));
        displayBooks();
      }

      /* ADD / UPDATE */
      function addOrUpdateBook() {
        const title = document.getElementById("title").value.trim();
        const author = document.getElementById("author").value.trim();
        const status = document.getElementById("status").value;

        if (!title || !author) {
          alert("Please fill all fields");
          return;
        }

        if (editId) {
          books = books.map((b) =>
            b.id === editId ? { id: editId, title, author, status } : b,
          );
          editId = null;
          submitBtn.innerText = "Add Book";
        } else {
          books.push({ id: Date.now(), title, author, status });
        }

        document.getElementById("title").value = "";
        document.getElementById("author").value = "";
        document.getElementById("status").value = "Available";

        saveBooks();
      }

      /* DISPLAY */
      function displayBooks(filteredBooks = books) {
        const bookList = document.getElementById("bookList");
        bookList.innerHTML = "";

        filteredBooks.forEach((book) => {
          bookList.innerHTML += `
        <tr class="hover:bg-green-50 transition duration-200">
            <td class="p-6 font-medium text-gray-700">${book.title}</td>
            <td class="p-6 text-gray-500">${book.author}</td>
            <td class="p-6">
                <span class="px-4 py-1 rounded-full text-sm font-medium
                ${
                  book.status === "Available"
                    ? "bg-green-100 text-green-700"
                    : "bg-red-100 text-red-600"
                }">
                ${book.status}
                </span>
            </td>
            <td class="p-6 text-center space-x-2">

                <button onclick="editBook(${book.id})"
                class="px-4 py-2 rounded-xl border border-gray-300 
                text-gray-600 text-sm transition hover:border-green-500 hover:text-green-600">
                Edit
                </button>

                <button onclick="toggleStatus(${book.id})"
                class="px-4 py-2 rounded-xl border border-green-400 
                text-green-600 text-sm transition hover:bg-green-500 hover:text-white">
                Toggle
                </button>

                <button onclick="deleteBook(${book.id})"
                class="px-4 py-2 rounded-xl border border-red-300 
                text-red-500 text-sm transition hover:bg-red-500 hover:text-white">
                Delete
                </button>

            </td>
        </tr>`;
        });

        document.getElementById("totalBooks").innerText = books.length;
      }

      /* EDIT */
      function editBook(id) {
        const book = books.find((b) => b.id === id);
        title.value = book.title;
        author.value = book.author;
        status.value = book.status;
        editId = id;
        submitBtn.innerText = "Update Book";
      }

      /* DELETE */
      function deleteBook(id) {
        books = books.filter((b) => b.id !== id);
        saveBooks();
      }

      /* TOGGLE */
      function toggleStatus(id) {
        books = books.map((b) => {
          if (b.id === id) {
            b.status = b.status === "Available" ? "Issued" : "Available";
          }
          return b;
        });
        saveBooks();
      }

      /* SEARCH */
      function searchBooks() {
        const query = searchInput.value.toLowerCase();
        const filtered = books.filter(
          (b) =>
            b.title.toLowerCase().includes(query) ||
            b.author.toLowerCase().includes(query),
        );
        displayBooks(filtered);
      }

      displayBooks();
    </script>
  </body>
</html>
